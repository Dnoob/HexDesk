# CNB CI: 从 GitHub Release 同步 VM 镜像到 CNB Release（国内加速源）
# VM 构建需要特权容器（mount/chroot），CNB 不支持，所以从 GitHub 搬运

main:
  push:
    - name: sync-vm-image
      ifModify:
        - "vm/**"
        - "scripts/build-vm.sh"
        - ".cnb.yml"
      docker:
        image: ubuntu:24.04
      stages:
        - name: Download from GitHub Release
          script: |
            apt-get update -qq && apt-get install -y -qq curl
            mkdir -p /workspace/vm-output
            BASE="https://github.com/Dnoob/HexDesk/releases/download/vm-latest"
            for f in ubuntu.img vmlinuz initrd ubuntu.img.sha256; do
              echo "Downloading $f ..."
              curl -L -f -o "/workspace/vm-output/$f" "$BASE/$f"
            done
            ls -lh /workspace/vm-output/

        - name: Upload to CNB Release
          image: cnbcool/attachments:latest
          settings:
            tag: vm-latest
            title: "VM Image (latest)"
            body: "Synced from GitHub Release. Fast download mirror for China."
            attachments:
              - /workspace/vm-output/ubuntu.img
              - /workspace/vm-output/vmlinuz
              - /workspace/vm-output/initrd
              - /workspace/vm-output/ubuntu.img.sha256
